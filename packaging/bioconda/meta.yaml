{% set name = "deepvariant" %}
{% set version = "1.9.0" %}
{% set sha256 = "6f7f413bb2feced916553b9dc0957369545883f67b4777280f1dabcd9fd2ab3b" %}
{% set sha256_macos_arm64 = "UPDATE_AFTER_RELEASE" %}
# When updating, also need to update model reference in post-link.sh
# NOTE: sha256_macos_arm64 must be updated after running package_release.sh
# which now bundles pip wheels in the tarball.

package:
  name: {{ name }}
  version: {{ version }}

# Things to work on:
# - Uses pre-built binaries, building problematic due to clif dependency
# - Need recent kernel with GLIBC > 2.23 due to pre-built htslib
# - Build patches __main__.py in zip files to generalize python dependency
# - Requires numpy 1.16, want to sync with CONDA_NPY
# - Uses python wrappers that don't expose all underlying options
# - Ships with pre-built model. Longer term will need way to fetch models on demand.

source:
  url: https://github.com/google/deepvariant/archive/v{{ version }}.tar.gz  # [not (osx and arm64)]
  sha256: {{ sha256 }}  # [not (osx and arm64)]
  url: https://github.com/antomicblitz/deepvariant-macos-arm64-metal/releases/download/v{{ version }}/deepvariant-{{ version }}-macos-arm64.tar.gz  # [osx and arm64]
  sha256: {{ sha256_macos_arm64 }}  # [osx and arm64]

build:
  number: 1
  skip: true  # [not (linux64 or (osx and arm64))]
  run_exports:
    - {{ pin_subpackage("deepvariant", max_pin="x") }}

requirements:
  host:
    - python <3.11  # [not (osx and arm64)]
    - python >=3.10,<3.11  # [osx and arm64]
    - pip
    - setuptools
    - unzip  # [not (osx and arm64)]
    - zip  # [not (osx and arm64)]
    - zlib  # [not (osx and arm64)]
    - curl  # [not (osx and arm64)]
  run:
    # NB: maintainers, check versions with upstream's settings.sh
    # --- Linux-only deps (unchanged from upstream) ---
    - openjdk 11.0.*  # [not (osx and arm64)]
    - python <3.11  # [not (osx and arm64)]
    - tensorflow 2.11.*  # [not (osx and arm64)]
    - tensorflow-estimator 2.11.*  # [not (osx and arm64)]
    - numpy >=1.21.2  # [not (osx and arm64)]
    - google-cloud-sdk  # [not (osx and arm64)]
    - boost-cpp  # [not (osx and arm64)]
    - htslib  # [not (osx and arm64)]
    - altair  # [not (osx and arm64)]
    - oauth2client  # [not (osx and arm64)]
    - six  # [not (osx and arm64)]
    - crcmod  # [not (osx and arm64)]
    # --- macOS ARM64 deps ---
    # tensorflow-macos is pip-only (Apple does not publish a conda package).
    # It is installed via pip in build.sh along with tensorflow-metal.
    # Its runtime deps must be listed here since pip --no-deps is used.
    - python >=3.10,<3.11  # [osx and arm64]
    - numpy >=1.22,<=1.24.3  # [osx and arm64]
    - protobuf 4.21.*  # [osx and arm64]
    - pysam >=0.22.1  # [osx and arm64]
    - pandas >=1.3  # [osx and arm64]
    - pillow >=9.0  # [osx and arm64]
    - scikit-learn >=1.0  # [osx and arm64]
    - sortedcontainers ==2.1.0  # [osx and arm64]
    - intervaltree ==3.1.0  # [osx and arm64]
    - joblib  # [osx and arm64]
    - pyyaml  # [osx and arm64]
    # tensorflow-macos runtime deps (installed via conda since pip
    # cannot download in the conda-build sandbox due to platform tags)
    - typing-extensions >=3.6.6,<4.6.0  # [osx and arm64]
    - astunparse >=1.6.0  # [osx and arm64]
    - flatbuffers >=23.1.21  # [osx and arm64]
    - gast >=0.2.1,<=0.4.0  # [osx and arm64]
    - google-pasta >=0.1.1  # [osx and arm64]
    - h5py >=2.9.0  # [osx and arm64]
    - libclang >=13.0.0  # [osx and arm64]
    - opt-einsum >=2.3.2  # [osx and arm64]
    - termcolor >=1.1.0  # [osx and arm64]
    - wrapt >=1.11.0  # [osx and arm64]
    - grpcio >=1.24.3,<2.0  # [osx and arm64]
    - tensorboard >=2.13,<2.14  # [osx and arm64]
    - tensorflow-estimator >=2.13.0,<2.14  # [osx and arm64]
    - keras >=2.13.1,<2.14  # [osx and arm64]
    - six >=1.12.0  # [osx and arm64]
    # --- Shared deps ---
    - absl-py
    - contextlib2
    - intervaltree  # [not (osx and arm64)]
    - mock
    - protobuf  # [not (osx and arm64)]
    - psutil
    - requests
    - scipy
    - parallel

test:
  commands:
    # Pre-built binaries need GLIBC 2.16 and 2.23 (htslib) so fail
    # - dv_make_examples.py -h  # [not (osx and arm64)]
    # - dv_call_variants.py -h  # [not (osx and arm64)]
    # - dv_postprocess_variants.py -h  # [not (osx and arm64)]
    # macOS ARM64: verify TF import and native binaries
    - python -c "import tensorflow as tf; print(tf.__version__)"  # [osx and arm64]
    - test -x $PREFIX/libexec/deepvariant/bin/make_examples  # [osx and arm64]
    - test -x $PREFIX/libexec/deepvariant/bin/call_variants  # [osx and arm64]
    - test -x $PREFIX/libexec/deepvariant/bin/postprocess_variants  # [osx and arm64]

about:
  home: "https://github.com/google/deepvariant"
  dev_url: "https://github.com/google/deepvariant"
  doc_url: "https://github.com/google/deepvariant/blob/v{{ version }}/README.md"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "DeepVariant is an analysis pipeline that uses a deep neural network to call genetic variants from next-generation DNA sequencing data."

extra:
  additional-platforms:
    - osx-arm64
  skip-lints:
    - missing_tests
